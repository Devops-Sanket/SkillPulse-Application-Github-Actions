name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            if [ ! -d ~/SkillPulse-Application-Github-Actions ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git ~/SkillPulse-Application-Github-Actions
            fi

            cd ~/SkillPulse-Application-Github-Actions

            git pull origin main

            if [ ! -f .env ]; then
              echo ".env file missing"
              exit 1
            fi

            docker compose pull
            docker compose up -d --pull always

            docker image prune -f
